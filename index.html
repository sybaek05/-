<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>만장일치 뒷풀이 정산기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; }
        .card { background: white; border-radius: 1rem; box-shadow: 0 4px 20px rgba(0,0,0,0.08); padding: 1.5rem; margin-bottom: 1.5rem; }
        .input-field { width: 100%; padding: 0.6rem 0.8rem; border-radius: 0.5rem; border: 1px solid #e5e7eb; outline: none; transition: all 0.2s; }
        .input-field:focus { border-color: #4f46e5; ring: 2px; ring-color: #c7d2fe; }
        .btn { padding: 0.6rem 1.2rem; border-radius: 0.5rem; font-weight: 600; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; justify-content: center; }
        .btn-primary { background: #4f46e5; color: white; }
        .btn-primary:hover { background: #4338ca; transform: translateY(-1px); }
        .btn-secondary { background: #f3f4f6; color: #374151; }
        .btn-secondary:hover { background: #e5e7eb; }
        .participant-tag { background: #eef2ff; color: #4338ca; padding: 0.3rem 0.8rem; border-radius: 9999px; font-size: 0.875rem; display: flex; align-items: center; gap: 0.5rem; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 pb-20">

    <div class="container mx-auto p-4 max-w-2xl">
        <!-- 헤더 -->
        <header class="text-center py-10">
            <div class="flex justify-center items-center gap-3 mb-2">
                <!-- 이미지 파일이 있으면 이미지 노출, 없으면 SVG 아이콘 노출 -->
                <img src="logo.jpg" alt="로고" class="h-12 w-auto" onerror="this.style.display='none'; document.getElementById('fallback-icon').style.display='block';">
                <div id="fallback-icon" style="display:none;" class="bg-indigo-600 p-2 rounded-lg text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
                    </svg>
                </div>
                <h1 class="text-3xl font-extrabold tracking-tight">만장일치 뒷풀이 정산기</h1>
            </div>
            <p class="text-slate-500">정확하고 투명한 회식비 정산의 시작</p>
        </header>

        <!-- 1. 계좌 정보 설정 -->
        <section class="card">
            <h2 class="font-bold text-lg mb-4 flex items-center gap-2">💰 입금 계좌 설정</h2>
            <input type="text" id="bank-info" class="input-field" placeholder="예: 카카오뱅크 3333-01-234567 홍길동">
        </section>

        <!-- 2. 참가자 관리 -->
        <section class="card">
            <h2 class="font-bold text-lg mb-4">👤 1. 참가자 관리</h2>
            <div class="flex gap-2 mb-4">
                <input type="text" id="p-name" class="input-field" placeholder="이름 입력 후 Enter">
                <button onclick="addPerson()" class="btn btn-primary whitespace-nowrap">추가</button>
            </div>
            <div id="p-list" class="flex flex-wrap gap-2"></div>
        </section>

        <!-- 3. 차수별 비용 입력 -->
        <section class="card">
            <div class="flex justify-between items-center mb-4">
                <h2 class="font-bold text-lg">📊 2. 차수별 비용 입력</h2>
                <button onclick="addRound()" class="btn btn-secondary text-sm px-3">+ 차수 추가</button>
            </div>
            <div id="round-container" class="space-y-4"></div>
        </section>

        <!-- 정산 실행 -->
        <div class="text-center py-4">
            <button onclick="calculate()" class="btn btn-primary w-full py-4 text-xl shadow-lg shadow-indigo-200">정산하기</button>
        </div>

        <!-- 4. 결과창 -->
        <section id="result-card" class="card hidden border-2 border-indigo-100">
            <div class="flex justify-between items-center mb-4">
                <h2 class="font-bold text-lg text-indigo-700">📢 최종 정산 안내문</h2>
                <button onclick="copyToClipboard()" class="btn btn-secondary text-sm px-3">결과 복사하기</button>
            </div>
            <pre id="result-text" class="whitespace-pre-wrap bg-slate-50 p-4 rounded-lg text-sm leading-relaxed"></pre>
            <p id="copy-msg" class="text-indigo-600 text-center text-xs mt-2 hidden font-bold">클립보드에 복사되었습니다!</p>
        </section>
    </div>

    <script>
        let participants = [];
        let rounds = [];

        function addPerson() {
            const input = document.getElementById('p-name');
            const name = input.value.trim();
            if (name && !participants.includes(name)) {
                participants.push(name);
                input.value = '';
                render();
            }
        }

        document.getElementById('p-name').addEventListener('keypress', e => { if(e.key === 'Enter') addPerson(); });

        function removePerson(index) {
            const name = participants[index];
            participants.splice(index, 1);
            rounds.forEach(r => {
                r.members = r.members.filter(m => m !== name);
                r.drinkers = r.drinkers.filter(m => m !== name);
            });
            render();
        }

        function addRound() {
            rounds.push({ title: `${rounds.length + 1}차`, total: 0, alcohol: 0, members: [...participants], drinkers: [...participants] });
            render();
        }

        function toggleMember(rIdx, name) {
            const r = rounds[rIdx];
            if (r.members.includes(name)) {
                r.members = r.members.filter(m => m !== name);
                r.drinkers = r.drinkers.filter(m => m !== name);
            } else {
                r.members.push(name);
            }
            render();
        }

        function toggleDrinker(rIdx, name) {
            const r = rounds[rIdx];
            if (!r.members.includes(name)) return;
            if (r.drinkers.includes(name)) {
                r.drinkers = r.drinkers.filter(m => m !== name);
            } else {
                r.drinkers.push(name);
            }
            render();
        }

        function render() {
            const pList = document.getElementById('p-list');
            pList.innerHTML = participants.map((p, i) => `
                <div class="participant-tag">
                    ${p} <button onclick="removePerson(${i})" class="hover:text-red-500 font-bold">&times;</button>
                </div>
            `).join('');

            const rContainer = document.getElementById('round-container');
            rContainer.innerHTML = rounds.map((r, i) => `
                <div class="p-4 border rounded-xl bg-slate-50 relative">
                    <button onclick="rounds.splice(${i},1); render();" class="absolute top-2 right-2 text-slate-400 hover:text-red-500 text-xl">&times;</button>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-2 mb-3 mt-4">
                        <input type="text" value="${r.title}" oninput="rounds[${i}].title=this.value" class="input-field font-bold" placeholder="장소명">
                        <input type="number" value="${r.total || ''}" oninput="rounds[${i}].total=Number(this.value)" class="input-field" placeholder="총액">
                        <input type="number" value="${r.alcohol || ''}" oninput="rounds[${i}].alcohol=Number(this.value)" class="input-field" placeholder="술값">
                    </div>
                    <div class="text-xs text-slate-500 mb-2">인원 선택 (주: 술 마심)</div>
                    <div class="flex flex-wrap gap-2">
                        ${participants.map(p => `
                            <div class="flex items-center gap-1 bg-white p-1 px-2 rounded border">
                                <span class="text-sm ${r.members.includes(p) ? 'font-bold text-indigo-600' : 'line-through text-slate-300 cursor-pointer'}" onclick="toggleMember(${i}, '${p}')">${p}</span>
                                <button onclick="toggleDrinker(${i}, '${p}')" class="text-[10px] px-1 rounded ${r.drinkers.includes(p) ? 'bg-blue-100 text-blue-600' : 'bg-slate-100 text-slate-400'}">주</button>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function calculate() {
            if (participants.length === 0) return alert('참가자를 추가해주세요.');
            if (rounds.length === 0) return alert('차수 정보를 추가해주세요.');

            const userTotals = {};
            participants.forEach(p => userTotals[p] = 0);

            rounds.forEach(r => {
                const foodTotal = r.total - r.alcohol;
                const perFood = r.members.length ? (foodTotal / r.members.length) : 0;
                const perAlcohol = r.drinkers.length ? (r.alcohol / r.drinkers.length) : 0;

                r.members.forEach(m => userTotals[m] += perFood);
                r.drinkers.forEach(d => userTotals[d] += perAlcohol);
            });

            // 금액별 그룹화 (10원 단위 절사 등 처리 가능하지만 여기선 원단위 표시)
            const groups = {};
            for (const [name, amount] of Object.entries(userTotals)) {
                if (amount === 0) continue;
                const rounded = Math.floor(amount); // 소수점 버림
                if (!groups[rounded]) groups[rounded] = [];
                groups[rounded].push(name);
            }

            const bank = document.getElementById('bank-info').value || "[계좌 정보를 입력해주세요]";
            let resultTxt = `📢 뒷풀이 정산안내\n최종 정산 결과입니다. 본인의 성함을 확인해 주시고, 아래 계좌로 입금 부탁드립니다!\n\n💰 [입금 계좌: ${bank}]\n`;

            // 금액이 큰 순서대로 정렬
            const sortedAmounts = Object.keys(groups).sort((a, b) => b - a);
            sortedAmounts.forEach(amt => {
                const names = groups[amt];
                resultTxt += `💵 ${Number(amt).toLocaleString()}원 (${names.length}명)\n${names.join(', ')}\n`;
            });

            document.getElementById('result-text').innerText = resultTxt;
            document.getElementById('result-card').classList.remove('hidden');
            document.getElementById('result-card').scrollIntoView({ behavior: 'smooth' });
        }

        function copyToClipboard() {
            const text = document.getElementById('result-text').innerText;
            navigator.clipboard.writeText(text).then(() => {
                const msg = document.getElementById('copy-msg');
                msg.classList.remove('hidden');
                setTimeout(() => msg.classList.add('hidden'), 2000);
            });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>만장일치 뒷풀이 정산기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f8fafc;
        }
        .card {
            background-color: white;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .input-field {
            width: 100%;
            padding: 0.6rem 0.8rem;
            border-radius: 0.5rem;
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
        }
        .input-field:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }
        .participant-tag {
            display: inline-flex;
            align-items: center;
            background-color: #eef2ff;
            color: #4338ca;
            padding: 0.35rem 0.8rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 500;
            border: 1px solid #e0e7ff;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-slate-800 pb-12">

    <div class="container mx-auto p-4 md:p-8 max-w-4xl">
        <header class="text-center mb-10">
            <div class="flex flex-col items-center gap-3">
                <div class="bg-indigo-600 p-3 rounded-2xl shadow-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                </div>
                <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight">만장일치 정산기</h1>
            </div>
            <p class="text-slate-500 mt-3 text-lg font-medium">인원별 금액을 그룹화하여 깔끔한 안내문을 만들어줍니다.</p>
        </header>

        <!-- 1. 참가자 관리 -->
        <section id="participant-section" class="card border border-slate-100">
            <h2 class="text-xl font-bold mb-4 text-slate-800 flex items-center gap-2">
                <span class="bg-indigo-100 text-indigo-600 w-7 h-7 rounded-full flex items-center justify-center text-sm font-bold">1</span>
                참가자 등록
            </h2>
            <div class="flex flex-col sm:flex-row gap-2 mb-4">
                <input type="text" id="participant-name" placeholder="이름 입력 후 엔터" class="input-field flex-grow">
                <button id="add-participant-btn" class="bg-indigo-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-indigo-700 transition-colors shadow-md active:scale-95">추가</button>
            </div>
            <div id="participant-list" class="flex flex-wrap gap-2">
                <!-- 참가자 태그 -->
            </div>
        </section>

        <!-- 2. 계좌 정보 설정 -->
        <section class="card border border-slate-100">
            <h2 class="text-xl font-bold mb-4 text-slate-800 flex items-center gap-2">
                <span class="bg-indigo-100 text-indigo-600 w-7 h-7 rounded-full flex items-center justify-center text-sm font-bold">2</span>
                입금 계좌 정보
            </h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="text-xs font-bold text-slate-400 block mb-1">은행 및 예금주</label>
                    <input type="text" id="bank-info" placeholder="카카오뱅크 백승엽" value="카카오뱅크 백승엽" class="input-field">
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-400 block mb-1">계좌번호</label>
                    <input type="text" id="account-number" placeholder="계좌번호 입력" value="3333345184515" class="input-field">
                </div>
            </div>
        </section>

        <!-- 3. 차수별 비용 입력 -->
        <section id="rounds-section" class="card border border-slate-100">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                    <span class="bg-indigo-100 text-indigo-600 w-7 h-7 rounded-full flex items-center justify-center text-sm font-bold">3</span>
                    차수별 비용 입력
                </h2>
                <button id="add-round-btn" class="flex items-center gap-1 text-sm font-bold text-indigo-600 bg-indigo-50 px-3 py-2 rounded-lg hover:bg-indigo-100 transition-colors">
                    + 차수 추가
                </button>
            </div>
            <div id="round-list" class="space-y-4">
                <!-- 차수 카드 -->
            </div>
        </section>

        <!-- 4. 정산하기 버튼 -->
        <div class="text-center my-10">
            <button id="calculate-btn" class="bg-slate-900 text-white text-xl font-bold px-12 py-4 rounded-2xl shadow-xl hover:bg-slate-800 transition-all transform hover:-translate-y-1 active:scale-95">
                정산하기
            </button>
        </div>

        <!-- 결과 모달 -->
        <div id="result-modal" class="fixed inset-0 bg-slate-900/60 hidden z-50 flex items-center justify-center p-4 backdrop-blur-sm">
            <div class="bg-white rounded-3xl w-full max-w-2xl max-h-[90vh] overflow-hidden flex flex-col shadow-2xl border border-slate-200">
                <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-white">
                    <h2 class="text-2xl font-bold text-slate-900">📢 정산 결과 안내</h2>
                    <button onclick="closeResult()" class="text-slate-400 hover:text-slate-600 p-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                    </button>
                </div>
                
                <div id="result-output" class="p-8 overflow-y-auto no-scrollbar flex-grow bg-slate-50">
                    <!-- 결과 텍스트 영역 -->
                    <div id="formatted-text" class="whitespace-pre-wrap font-medium text-slate-700 bg-white p-6 rounded-2xl border border-slate-200 leading-relaxed shadow-inner">
                    </div>
                </div>

                <div class="p-6 bg-white border-t border-slate-100 flex flex-col sm:flex-row gap-3">
                    <button id="copy-result-btn" class="flex-1 bg-indigo-600 text-white font-bold py-4 rounded-xl hover:bg-indigo-700 shadow-lg flex items-center justify-center gap-2 transition-all active:scale-95">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" /></svg>
                        정산문구 복사하기
                    </button>
                    <button onclick="closeResult()" class="flex-1 bg-slate-100 text-slate-600 font-bold py-4 rounded-xl hover:bg-slate-200 transition-colors">
                        닫기
                    </button>
                </div>
            </div>
        </div>

        <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full shadow-2xl opacity-0 transition-opacity z-[60] pointer-events-none font-medium">
            복사되었습니다!
        </div>

    </div>

    <script>
        // --- 상태 관리 ---
        let participants = ["김재동", "이유동", "백승엽", "김영수", "박정은", "송형록", "최은비", "한나결", "권승민", "김효정", "이소영", "박시우"];
        let rounds = [
            { description: '1차 고기집', totalCost: 240000, alcoholCost: 40000, attendees: [...participants], drinkers: ["김재동", "이유동", "백승엽", "김영수", "박정은", "송형록", "최은비", "한나결", "권승민"] }
        ];

        // --- DOM 참조 ---
        const participantInput = document.getElementById('participant-name');
        const addParticipantBtn = document.getElementById('add-participant-btn');
        const participantListDiv = document.getElementById('participant-list');
        const roundListDiv = document.getElementById('round-list');
        const calculateBtn = document.getElementById('calculate-btn');
        const resultModal = document.getElementById('result-modal');
        const formattedTextDiv = document.getElementById('formatted-text');
        const copyBtn = document.getElementById('copy-result-btn');

        // --- 기능 함수 ---
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 2000);
        }

        function renderParticipants() {
            participantListDiv.innerHTML = '';
            participants.forEach((name, index) => {
                const tag = document.createElement('div');
                tag.className = 'participant-tag group';
                tag.innerHTML = `
                    <span>${name}</span>
                    <button onclick="removeParticipant(${index})" class="ml-2 text-indigo-300 hover:text-rose-500 transition-colors">
                        &times;
                    </button>
                `;
                participantListDiv.appendChild(tag);
            });
            renderRounds();
        }

        function removeParticipant(index) {
            const name = participants[index];
            participants.splice(index, 1);
            rounds.forEach(r => {
                r.attendees = r.attendees.filter(p => p !== name);
                r.drinkers = r.drinkers.filter(p => p !== name);
            });
            renderParticipants();
        }

        function addParticipant() {
            const name = participantInput.value.trim();
            if (name && !participants.includes(name)) {
                participants.push(name);
                participantInput.value = '';
                rounds.forEach(r => {
                    r.attendees.push(name);
                    r.drinkers.push(name);
                });
                renderParticipants();
            }
            participantInput.focus();
        }

        addParticipantBtn.addEventListener('click', addParticipant);
        participantInput.addEventListener('keypress', e => e.key === 'Enter' && addParticipant());

        function addRound() {
            rounds.push({
                description: `${rounds.length + 1}차`,
                totalCost: 0,
                alcoholCost: 0,
                attendees: [...participants],
                drinkers: [...participants]
            });
            renderRounds();
        }
        document.getElementById('add-round-btn').addEventListener('click', addRound);

        function removeRound(index) {
            if (rounds.length > 1) {
                rounds.splice(index, 1);
                renderRounds();
            }
        }

        function updateRoundData(index, field, value) {
            if (field === 'totalCost' || field === 'alcoholCost') {
                rounds[index][field] = Number(value) || 0;
            } else {
                rounds[index][field] = value;
            }
        }

        function togglePerson(roundIndex, name, type) {
            const round = rounds[roundIndex];
            const list = type === 'attend' ? round.attendees : round.drinkers;
            if (list.includes(name)) {
                list.splice(list.indexOf(name), 1);
                if (type === 'attend' && round.drinkers.includes(name)) round.drinkers.splice(round.drinkers.indexOf(name), 1);
            } else {
                list.push(name);
                if (type === 'drink' && !round.attendees.includes(name)) round.attendees.push(name);
            }
            renderRounds();
        }

        function renderRounds() {
            roundListDiv.innerHTML = '';
            rounds.forEach((round, index) => {
                const card = document.createElement('div');
                card.className = 'p-5 border border-slate-200 rounded-2xl bg-white shadow-sm';
                card.innerHTML = `
                    <div class="flex justify-between items-center mb-4">
                        <input type="text" value="${round.description}" oninput="updateRoundData(${index}, 'description', this.value)" 
                            class="font-bold text-lg border-b border-dashed border-slate-300 focus:outline-none focus:border-indigo-500 w-1/2">
                        <button onclick="removeRound(${index})" class="text-rose-400 hover:text-rose-600">삭제</button>
                    </div>
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="text-xs font-bold text-slate-400 block mb-1">총액</label>
                            <input type="number" value="${round.totalCost || ''}" oninput="updateRoundData(${index}, 'totalCost', this.value)" class="input-field">
                        </div>
                        <div>
                            <label class="text-xs font-bold text-slate-400 block mb-1">그 중 술값</label>
                            <input type="number" value="${round.alcoholCost || ''}" oninput="updateRoundData(${index}, 'alcoholCost', this.value)" class="input-field">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 sm:grid-cols-4 gap-2 max-h-40 overflow-y-auto no-scrollbar border-t border-slate-50 pt-3">
                        ${participants.map(name => `
                            <div class="flex flex-col p-2 rounded-lg ${round.attendees.includes(name) ? 'bg-slate-50' : 'bg-transparent opacity-40'}">
                                <span class="text-xs font-bold text-slate-700 truncate mb-1">${name}</span>
                                <div class="flex gap-1">
                                    <button onclick="togglePerson(${index}, '${name}', 'attend')" 
                                        class="flex-1 py-1 text-[9px] font-bold rounded ${round.attendees.includes(name) ? 'bg-indigo-600 text-white' : 'bg-slate-200 text-slate-500'}">참</button>
                                    <button onclick="togglePerson(${index}, '${name}', 'drink')" 
                                        class="flex-1 py-1 text-[9px] font-bold rounded ${round.drinkers.includes(name) ? 'bg-amber-500 text-white' : 'bg-slate-200 text-slate-500'}"
                                        ${!round.attendees.includes(name) ? 'disabled' : ''}>주</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                roundListDiv.appendChild(card);
            });
        }

        let resultString = "";

        calculateBtn.addEventListener('click', () => {
            if (participants.length === 0) return showToast("참가자를 등록해주세요.");
            
            const totals = {};
            participants.forEach(p => totals[p] = 0);

            rounds.forEach(round => {
                const food = round.totalCost - round.alcoholCost;
                const perFood = round.attendees.length > 0 ? (food / round.attendees.length) : 0;
                const perAlcohol = round.drinkers.length > 0 ? (round.alcoholCost / round.drinkers.length) : 0;

                participants.forEach(name => {
                    if (round.attendees.includes(name)) totals[name] += perFood;
                    if (round.drinkers.includes(name)) totals[name] += perAlcohol;
                });
            });

            // 그룹화 로직
            const grouped = {};
            participants.forEach(name => {
                // 10원 단위 절사 혹은 반올림 (사용자 예시 참고하여 절사 적용)
                const amount = Math.floor(totals[name]); 
                if (!grouped[amount]) grouped[amount] = [];
                grouped[amount].push(name);
            });

            const bank = document.getElementById('bank-info').value;
            const account = document.getElementById('account-number').value;

            let output = `📢 뒷풀이 정산안내\n최종 정산 결과입니다. 본인의 성함을 확인해 주시고, 아래 계좌로 입금 부탁드립니다!\n\n`;
            output += `💰 [입금 계좌: ${account} ${bank}]\n\n`;

            // 금액이 높은 순서대로 정렬하여 출력
            const sortedAmounts = Object.keys(grouped).map(Number).sort((a, b) => b - a);
            
            sortedAmounts.forEach(amount => {
                const people = grouped[amount];
                output += `💵 ${amount.toLocaleString()}원 (${people.length}명)\n`;
                output += `${people.join(', ')}\n\n`;
            });

            resultString = output.trim();
            formattedTextDiv.innerText = resultString;
            resultModal.classList.remove('hidden');
        });

        function closeResult() {
            resultModal.classList.add('hidden');
        }

        copyBtn.addEventListener('click', () => {
            const temp = document.createElement('textarea');
            temp.value = resultString;
            document.body.appendChild(temp);
            temp.select();
            document.execCommand('copy');
            document.body.removeChild(temp);
            showToast("정산 안내문이 복사되었습니다!");
        });

        renderParticipants();
    </script>
</body>
</html>

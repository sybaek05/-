<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>만장일치 뒷풀이 정산기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; }
        .card { background-color: white; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); padding: 1.25rem; margin-bottom: 1.25rem; }
        .input-field { width: 100%; padding: 0.5rem 0.75rem; border-radius: 0.5rem; border: 1px solid #e2e8f0; outline: none; font-size: 0.9rem; }
        .input-field:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
        .participant-tag { display: inline-flex; align-items: center; background-color: #eef2ff; color: #4338ca; padding: 0.25rem 0.6rem; border-radius: 9999px; font-size: 0.8rem; font-weight: 500; border: 1px solid #e0e7ff; }
    </style>
</head>
<body class="text-slate-800 pb-12">

    <div class="container mx-auto p-2 md:p-6 max-w-5xl">
        <header class="text-center mb-6">
            <div class="flex flex-col items-center gap-2">
                <img src="logo.jpg" alt="로고" class="h-14 w-auto" onerror="this.style.display='none'; document.getElementById('fallback-icon').style.display='block';">
                <div id="fallback-icon" style="display:none;" class="bg-indigo-600 p-2 rounded-xl text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                </div>
                <h1 class="text-3xl font-black text-slate-900 tracking-tight">만장일치 정산기</h1>
            </div>
        </header>

        <!-- ⚡ N빵 계산기 (더 콤팩트하게) -->
        <section class="card border-2 border-indigo-100 bg-indigo-50/30 py-3">
            <div class="flex flex-wrap items-center gap-4">
                <h2 class="font-bold text-indigo-700 whitespace-nowrap">⚡ N빵</h2>
                <input type="number" id="simple-total" oninput="doSimpleCalc()" placeholder="총액" class="input-field flex-1 min-w-[100px]">
                <input type="number" id="simple-count" oninput="doSimpleCalc()" placeholder="인원" class="input-field flex-1 min-w-[80px]">
                <div id="simple-result-area" class="hidden items-center gap-2">
                    <span class="text-lg font-black text-indigo-600"><span id="simple-per-person">0</span>원</span>
                    <button onclick="copySimpleResult()" class="bg-indigo-600 text-white px-3 py-1.5 rounded-lg font-bold text-xs">복사</button>
                </div>
            </div>
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <!-- 왼쪽: 설정 영역 -->
            <div class="lg:col-span-4 space-y-4">
                <section class="card border border-slate-100 h-fit">
                    <h2 class="font-bold mb-3 flex items-center gap-2 text-slate-700">👤 명단 일괄 등록</h2>
                    <textarea id="participant-names" rows="4" placeholder="쉼표나 엔터로 구분" class="input-field mb-2 text-sm"></textarea>
                    <button id="add-participant-btn" class="bg-indigo-600 text-white w-full py-2.5 rounded-lg font-bold text-sm shadow-sm">명단 추가</button>
                    <div id="participant-list" class="flex flex-wrap gap-1.5 mt-3"></div>
                </section>

                <section class="card border border-slate-100 h-fit">
                    <h2 class="font-bold mb-3 text-slate-700">💰 계좌 설정</h2>
                    <div class="space-y-2">
                        <input type="text" id="bank-info" oninput="saveData()" placeholder="은행 및 예금주" class="input-field">
                        <input type="text" id="account-number" oninput="saveData()" placeholder="계좌번호" class="input-field">
                    </div>
                </section>
                
                <div class="flex gap-2">
                    <button onclick="resetRoundsOnly()" class="flex-1 bg-slate-200 text-slate-600 font-bold py-3 rounded-xl text-sm">내역 초기화</button>
                    <button id="calculate-btn" class="flex-[2] bg-slate-900 text-white font-bold py-3 rounded-xl shadow-lg active:scale-95 text-lg">상세 정산하기</button>
                </div>
            </div>

            <!-- 오른쪽: 차수 입력 영역 (스크롤 없이 펼쳐짐) -->
            <div class="lg:col-span-8">
                <section id="rounds-section">
                    <div class="flex justify-between items-center mb-4 px-1">
                        <h2 class="text-xl font-bold text-slate-800">📊 차수별 상세 정산</h2>
                        <button id="add-round-btn" class="text-sm font-bold text-indigo-600 bg-indigo-50 px-3 py-2 rounded-lg border border-indigo-100">+ 차수 추가</button>
                    </div>
                    <div id="round-list" class="space-y-6"></div>
                </section>
            </div>
        </div>

        <!-- 모달 & 토스트 생략 (로직 동일) -->
        <div id="result-modal" class="fixed inset-0 bg-slate-900/60 hidden z-50 flex items-center justify-center p-4 backdrop-blur-sm">
            <div class="bg-white rounded-3xl w-full max-w-2xl max-h-[90vh] overflow-hidden flex flex-col shadow-2xl">
                <div class="p-5 border-b flex justify-between items-center bg-white">
                    <h2 class="text-xl font-bold text-slate-900">📢 정산 결과</h2>
                    <button onclick="closeResult()" class="text-slate-400 p-2"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg></button>
                </div>
                <div class="p-6 overflow-y-auto flex-grow bg-slate-50">
                    <div id="formatted-text" class="whitespace-pre-wrap font-medium text-slate-700 bg-white p-5 rounded-2xl border border-slate-200 shadow-inner text-sm leading-relaxed"></div>
                </div>
                <div class="p-5 bg-white border-t flex gap-3">
                    <button id="copy-result-btn" class="flex-1 bg-indigo-600 text-white font-bold py-3.5 rounded-xl shadow-md active:scale-95">복사하기</button>
                    <button onclick="closeResult()" class="flex-1 bg-slate-100 text-slate-500 font-bold py-3.5 rounded-xl">닫기</button>
                </div>
            </div>
        </div>
        <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full shadow-2xl opacity-0 transition-opacity z-[60] pointer-events-none text-sm">복사되었습니다!</div>
    </div>

    <script>
        let participants = [];
        let rounds = [];

        function saveData() {
            const data = {
                participants, rounds,
                bankInfo: document.getElementById('bank-info').value,
                accountNumber: document.getElementById('account-number').value,
                simpleTotal: document.getElementById('simple-total').value,
                simpleCount: document.getElementById('simple-count').value
            };
            localStorage.setItem('mj_settle_data', JSON.stringify(data));
        }

        function loadData() {
            const saved = localStorage.getItem('mj_settle_data');
            if (saved) {
                const data = JSON.parse(saved);
                participants = data.participants || [];
                rounds = data.rounds || [];
                document.getElementById('bank-info').value = data.bankInfo || "";
                document.getElementById('account-number').value = data.accountNumber || "";
                document.getElementById('simple-total').value = data.simpleTotal || "";
                document.getElementById('simple-count').value = data.simpleCount || "";
                doSimpleCalc();
            } else {
                participants = ["김철수", "이영희", "박민수"];
                rounds = [{ description: '1차 장소', totalCost: 0, alcoholCost: 0, attendees: [...participants], drinkers: [...participants] }];
            }
            renderParticipants();
        }

        function doSimpleCalc() {
            const total = Number(document.getElementById('simple-total').value);
            const count = Number(document.getElementById('simple-count').value);
            const resArea = document.getElementById('simple-result-area');
            const perPerson = document.getElementById('simple-per-person');
            if (total > 0 && count > 0) {
                perPerson.innerText = Math.floor(total / count).toLocaleString();
                resArea.classList.remove('hidden'); resArea.classList.add('flex');
            } else {
                resArea.classList.add('hidden'); resArea.classList.remove('flex');
            }
            saveData();
        }

        function renderParticipants() {
            document.getElementById('participant-list').innerHTML = participants.map((name, index) => `
                <div class="participant-tag">
                    ${name} <button onclick="removeParticipant(${index})" class="ml-1 text-indigo-300 hover:text-rose-500">&times;</button>
                </div>`).join('');
            renderRounds();
        }

        function removeParticipant(index) {
            const name = participants[index];
            participants.splice(index, 1);
            rounds.forEach(r => { 
                r.attendees = r.attendees.filter(p => p !== name); 
                r.drinkers = r.drinkers.filter(p => p !== name); 
            });
            saveData(); renderParticipants();
        }

        function addParticipantsBulk() {
            const textarea = document.getElementById('participant-names');
            const names = textarea.value.split(/[\n,]+/).map(n => n.trim()).filter(n => n.length > 0);
            names.forEach(name => {
                if (!participants.includes(name)) {
                    participants.push(name);
                    rounds.forEach(r => { r.attendees.push(name); r.drinkers.push(name); });
                }
            });
            textarea.value = ''; saveData(); renderParticipants();
        }
        document.getElementById('add-participant-btn').addEventListener('click', addParticipantsBulk);

        function renderRounds() {
            document.getElementById('round-list').innerHTML = rounds.map((r, i) => `
                <div class="card border border-slate-200 shadow-sm relative">
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <span class="text-[10px] font-bold px-2 py-0.5 rounded-full bg-indigo-50 text-indigo-500">
                                참석 ${r.attendees.length} / 음주 ${r.drinkers.length}
                            </span>
                            <div class="mt-1 flex items-center gap-2">
                                <input type="text" value="${r.description}" oninput="updateRoundData(${i}, 'description', this.value)" class="font-bold text-lg border-b border-dashed border-slate-200 focus:outline-none focus:border-indigo-500">
                            </div>
                        </div>
                        <button onclick="rounds.splice(${i},1); saveData(); renderRounds();" class="text-slate-300 hover:text-rose-500 text-sm">삭제</button>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-3 mb-4">
                        <input type="number" value="${r.totalCost || ''}" oninput="updateRoundData(${i}, 'totalCost', this.value)" class="input-field" placeholder="총액">
                        <input type="number" value="${r.alcoholCost || ''}" oninput="updateRoundData(${i}, 'alcoholCost', this.value)" class="input-field" placeholder="술값">
                    </div>

                    <!-- 명단 스크롤 제거: 모든 인원 격자 형태로 노출 -->
                    <div class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 lg:grid-cols-8 gap-2 border-t border-slate-50 pt-4">
                        ${participants.map(name => `
                            <div class="flex flex-col items-center gap-1.5 p-1.5 rounded-lg border border-slate-50 ${r.attendees.includes(name) ? 'bg-slate-50 shadow-sm' : 'opacity-30'}">
                                <span class="text-[11px] font-bold text-slate-600 truncate w-full text-center">${name}</span>
                                <div class="flex gap-1 w-full">
                                    <button onclick="togglePerson(${i}, '${name}', 'attend')" class="flex-1 py-1 text-[9px] font-black rounded ${r.attendees.includes(name) ? 'bg-indigo-600 text-white' : 'bg-slate-200 text-slate-400'}">참</button>
                                    <button onclick="togglePerson(${i}, '${name}', 'drink')" class="flex-1 py-1 text-[9px] font-black rounded ${r.drinkers.includes(name) ? 'bg-amber-500 text-white' : 'bg-slate-200 text-slate-400'}" ${!r.attendees.includes(name) ? 'disabled' : ''}>주</button>
                                </div>
                            </div>`).join('')}
                    </div>
                </div>`).join('');
        }

        // 공통 로직 (저장, 토글, 정산 등)
        function updateRoundData(idx, f, v) { rounds[idx][f] = (f==='totalCost'||f==='alcoholCost')?Number(v)||0 : v; saveData(); renderRounds(); }
        function togglePerson(rIdx, name, type) {
            const r = rounds[rIdx]; const list = type === 'attend' ? r.attendees : r.drinkers;
            if (list.includes(name)) {
                list.splice(list.indexOf(name), 1);
                if (type === 'attend' && r.drinkers.includes(name)) r.drinkers.splice(r.drinkers.indexOf(name), 1);
            } else {
                list.push(name);
                if (type === 'drink' && !r.attendees.includes(name)) r.attendees.push(name);
            }
            saveData(); renderRounds();
        }
        function resetRoundsOnly() {
            if(confirm("정산 내역만 초기화할까요? 명단은 유지됩니다.")) {
                rounds = [{ description: '1차 장소', totalCost: 0, alcoholCost: 0, attendees: [...participants], drinkers: [...participants] }];
                saveData(); renderRounds();
            }
        }
        function closeResult() { document.getElementById('result-modal').classList.add('hidden'); }
        function copySimpleResult() {
            const txt = `⚡ N빵 결과: 인당 ${document.getElementById('simple-per-person').innerText}원\n💰 계좌: ${document.getElementById('account-number').value} ${document.getElementById('bank-info').value}`;
            navigator.clipboard.writeText(txt).then(() => showToast("복사 완료!"));
        }
        function showToast(m) { const t=document.getElementById('toast'); t.innerText=m; t.style.opacity='1'; setTimeout(()=>t.style.opacity='0', 2000); }

        document.getElementById('calculate-btn').addEventListener('click', () => {
            const totals = {}; participants.forEach(p => totals[p] = 0);
            let summary = "📊 차수별 요약\n";
            rounds.forEach((r, idx) => {
                const foodPer = r.attendees.length ? (r.totalCost - r.alcoholCost) / r.attendees.length : 0;
                const drinkPer = r.drinkers.length ? r.alcoholCost / r.drinkers.length : 0;
                participants.forEach(p => { if(r.attendees.includes(p)) totals[p]+=foodPer; if(r.drinkers.includes(p)) totals[p]+=drinkPer; });
                summary += `[${idx+1}차: ${r.description}] ${r.totalCost.toLocaleString()}원 (${r.attendees.length}명)\n`;
            });
            const grouped = {}; participants.forEach(p => { const a = Math.floor(totals[p]); if(a>0){ if(!grouped[a]) grouped[a]=[]; grouped[a].push(p); } });
            const sorted = Object.keys(grouped).map(Number).sort((a,b)=>b-a);
            const res = `📢 정산 안내\n💰 계좌: ${document.getElementById('account-number').value} ${document.getElementById('bank-info').value}\n\n` + 
                sorted.map(a => `💵 ${a.toLocaleString()}원 (${grouped[a].length}명)\n${grouped[a].join(', ')}`).join('\n\n') + `\n\n------------------\n\n${summary}`;
            document.getElementById('formatted-text').innerText = res;
            document.getElementById('result-modal').classList.remove('hidden');
        });
        document.getElementById('copy-result-btn').addEventListener('click', () => { navigator.clipboard.writeText(document.getElementById('formatted-text').innerText).then(() => showToast("복사 완료!")); });
        document.getElementById('add-round-btn').addEventListener('click', () => { rounds.push({ description: `${rounds.length+1}차`, totalCost: 0, alcoholCost: 0, attendees: [...participants], drinkers: [...participants] }); renderRounds(); });

        window.onload = loadData;
    </script>
</body>
</html>
